apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local kind cluster: default storageClass (standard/local-path), Traefik on NodePorts,
# mq on local disk (base defaults). Placeholder secrets from base are used as-is.
#
# Tenants: list of onboarded otel-collector tenants for this env — add/remove a line
# per deploy/README.md "Onboarding a tenant". `local` is the default dev tenant
# (deploy/tenants/local), keyed with the same c3448fae key the stack has always used.
resources:
  - ../../base
  - ../../tenants/local

patches:
  - path: patches/traefik-service.yaml
