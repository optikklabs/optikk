# Adds a GCS-backed S3 disk + a `tiered` storage policy (hot=PVC, cold=GCS).
# Credentials come from env (ch-gcs-secret) so they stay out of the ConfigMap.
# NOTE: tables tier only once they declare storage_policy='tiered' + TTL ... TO VOLUME
# 'cold' — that DDL lives in ingest's embedded migrations (follow-up there).
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
data:
  storage_gcs.xml: |
    <clickhouse>
        <storage_configuration>
            <disks>
                <gcs>
                    <type>s3</type>
                    <!-- Replace REPLACE_CH_COLD_BUCKET with your GCS bucket. -->
                    <endpoint>https://storage.googleapis.com/REPLACE_CH_COLD_BUCKET/clickhouse/</endpoint>
                    <use_environment_credentials>true</use_environment_credentials>
                    <region>auto</region>
                    <!-- GCS lacks S3 batch delete. -->
                    <support_batch_delete>false</support_batch_delete>
                </gcs>
            </disks>
            <policies>
                <tiered>
                    <volumes>
                        <hot><disk>default</disk></hot>
                        <cold><disk>gcs</disk></cold>
                    </volumes>
                </tiered>
            </policies>
        </storage_configuration>
    </clickhouse>
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
spec:
  template:
    spec:
      containers:
        - name: clickhouse
          resources:
            requests: { cpu: "2", memory: 8Gi }
            limits: { memory: 8Gi }
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef: { name: ch-gcs-secret, key: access-key }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: ch-gcs-secret, key: secret-key }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: premium-rwo
        resources:
          requests:
            storage: 100Gi
