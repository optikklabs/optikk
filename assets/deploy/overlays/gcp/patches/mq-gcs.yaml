# Cloud: mq offloads storage to GCS via its S3-compatible interop API.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mq
spec:
  template:
    spec:
      containers:
        - name: mq
          resources:
            requests: { cpu: "1", memory: 2Gi }
            limits: { memory: 2Gi }
          env:
            - name: KAFKA_STORAGE_BACKEND
              value: "object"
            - name: KAFKA_OBJECT_ENDPOINT
              value: "https://storage.googleapis.com"
            # Replace with your GCS bucket name.
            - name: KAFKA_OBJECT_BUCKET
              value: "REPLACE_MQ_BUCKET"
            - name: KAFKA_OBJECT_REGION
              value: "auto"
            - name: KAFKA_OBJECT_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: mq-gcs-secret, key: access-key }
            - name: KAFKA_OBJECT_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: mq-gcs-secret, key: secret-key }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: premium-rwo
        resources:
          requests:
            storage: 5Gi
