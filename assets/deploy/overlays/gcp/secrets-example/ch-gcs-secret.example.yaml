# GCS HMAC interop keys for the ClickHouse cold-tier bucket. Create the real secret:
#   kubectl create secret generic ch-gcs-secret -n optikk \
#     --from-literal=access-key='<HMAC_ACCESS_ID>' \
#     --from-literal=secret-key='<HMAC_SECRET>'
# Consumed as AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY by the s3 disk. Example only.
apiVersion: v1
kind: Secret
metadata:
  name: ch-gcs-secret
  namespace: optikk
type: Opaque
stringData:
  access-key: REPLACE_HMAC_ACCESS_ID
  secret-key: REPLACE_HMAC_SECRET
