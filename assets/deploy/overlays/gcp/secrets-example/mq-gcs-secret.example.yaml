# GCS HMAC interop keys for the mq data bucket. Create the real secret out-of-band:
#   gcloud storage hmac create <SA_EMAIL>           # prints access id + secret
#   kubectl create secret generic mq-gcs-secret -n optikk \
#     --from-literal=access-key='<HMAC_ACCESS_ID>' \
#     --from-literal=secret-key='<HMAC_SECRET>'
# Do NOT commit real keys. This file is an example only.
apiVersion: v1
kind: Secret
metadata:
  name: mq-gcs-secret
  namespace: optikk
type: Opaque
stringData:
  access-key: REPLACE_HMAC_ACCESS_ID
  secret-key: REPLACE_HMAC_SECRET
