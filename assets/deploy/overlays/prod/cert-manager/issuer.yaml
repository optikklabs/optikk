# Let's Encrypt issuers. Staging first to avoid rate limits while validating DNS,
# then switch the Certificate's issuerRef to letsencrypt-prod for a trusted cert.
# HTTP-01 is solved via the Kubernetes Ingress provider, which base Traefik already
# enables (--providers.kubernetesingress=true), so cert-manager's challenge Ingress
# is served without touching the IngressRoute CRDs.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@optikk.in
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@optikk.in
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
