# One SAN cert covering both public hosts. cert-manager writes it to the
# optikk-tls Secret, which the default TLSStore serves on every TLS entrypoint.
# Start on letsencrypt-staging; flip issuerRef to letsencrypt-prod once validated.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: optikk-tls
spec:
  secretName: optikk-tls
  dnsNames:
    - api.optikk.in
    - ingest.optikk.in
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
