# The single default TLSStore Traefik honours: serves the cert-manager cert on
# every TLS-enabled entrypoint, so no per-tenant IngressRoute needs its own tls block.
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
spec:
  defaultCertificate:
    secretName: optikk-tls
---
# Default TLS policy for all routers: reject anything below TLS 1.2.
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: default
spec:
  minVersion: VersionTLS12
