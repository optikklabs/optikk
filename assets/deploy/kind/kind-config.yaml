# Single-node kind cluster. Host ports are non-privileged so no root bind is needed:
#   query API / UI -> http://localhost:18040   (TLS: https://localhost:19443)
#   OTLP gRPC      -> localhost:4317   OTLP HTTP -> localhost:4318
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - { containerPort: 30080, hostPort: 18040, protocol: TCP }
      - { containerPort: 30443, hostPort: 19443, protocol: TCP }
      - { containerPort: 30417, hostPort: 4317, protocol: TCP }
      - { containerPort: 30418, hostPort: 4318, protocol: TCP }
