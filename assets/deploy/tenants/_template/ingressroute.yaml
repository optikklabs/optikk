# Routes this tenant's OTLP traffic to their dedicated otel-collector by matching
# the x-api-key they authenticate with — same public :4317/:4318 entrypoints every
# tenant sends to, no client-side endpoint change on onboarding.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: otlp-http
spec:
  entryPoints: [otlp-http]
  routes:
    - match: Header(`x-api-key`, `REPLACE_WITH_<TENANT_KEY>`)
      kind: Rule
      services:
        - name: otel-collector-<id>
          port: 4318
      middlewares:
        - name: ratelimit
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: otlp-grpc
spec:
  entryPoints: [otlp-grpc]
  routes:
    - match: Header(`x-api-key`, `REPLACE_WITH_<TENANT_KEY>`)
      kind: Rule
      services:
        - name: otel-collector-<id>
          port: 4317
          scheme: h2c
      middlewares:
        - name: ratelimit
