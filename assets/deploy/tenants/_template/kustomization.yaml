# Template for a per-tenant otel-collector. To onboard a new tenant:
#   1. cp -r deploy/tenants/_template deploy/tenants/<id>
#   2. Replace every <id> and <TENANT_KEY> below and in ingressroute.yaml
#      with the tenant's real id and the api_key signup returned.
#   3. Apply the real key out-of-band (do NOT commit it):
#        kubectl create secret generic otel-collector-<id>-secret -n optikk \
#          --from-literal=api-key='<real key>' --dry-run=client -o yaml | kubectl apply -f -
#   4. Add "../../tenants/<id>" to the target overlay's resources: list.
#   5. kubectl apply -k deploy/overlays/<env>
# See deploy/README.md "Onboarding a tenant" for the full runbook, including offboarding.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: optikk

resources:
  - ../../base/otel-collector
  - ingressroute.yaml

nameSuffix: "-<id>"

labels:
  - pairs:
      tenant: "<id>"
    includeSelectors: true

patches:
  - target:
      kind: Secret
      name: otel-collector-secret
    patch: |-
      - op: replace
        path: /stringData/api-key
        value: REPLACE_WITH_<TENANT_KEY>
