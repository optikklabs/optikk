apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mq
spec:
  serviceName: mq
  replicas: 1
  selector:
    matchLabels:
      app: mq
  template:
    metadata:
      labels:
        app: mq
    spec:
      # fsGroup makes the PVC writable by the image's non-root user.
      securityContext:
        fsGroup: 65532
      containers:
        - name: mq
          image: ghcr.io/ramantayal12/mq:latest
          imagePullPolicy: Always
          ports:
            - { name: kafka, containerPort: 9092 }
            - { name: metrics, containerPort: 7080 }
          env:
            - name: KAFKA_LISTENERS
              value: "0.0.0.0:9092"
            # In-cluster clients reconnect to this DNS name after metadata.
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "mq:9092"
            - name: KAFKA_NUM_PARTITIONS
              value: "8"
            - name: KAFKA_AUTO_CREATE_TOPICS
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka"
            - name: KAFKA_METRICS_ADDR
              value: "0.0.0.0:7080"
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { memory: 1Gi }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
