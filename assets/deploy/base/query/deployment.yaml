apiVersion: apps/v1
kind: Deployment
metadata:
  name: query
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query
  template:
    metadata:
      labels:
        app: query
    spec:
      # Grants the onboarding provisioner its apply permissions (query/rbac.yaml).
      serviceAccountName: query
      # query runs MySQL migrations on boot; wait for the datastores.
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mariadb 3306; do echo waiting mariadb; sleep 2; done
              until nc -z clickhouse 9000; do echo waiting clickhouse; sleep 2; done
      containers:
        - name: query
          image: ghcr.io/optikklabs/query:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 19090 }
          env:
            - name: OPTIKK_MYSQL_HOST
              value: mariadb
            - name: OPTIKK_MYSQL_PORT
              value: "3306"
            - name: OPTIKK_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef: { name: mariadb-secret, key: root-password }
            - name: OPTIKK_CLICKHOUSE_HOST
              value: clickhouse
            - name: OPTIKK_CLICKHOUSE_PORT
              value: "9000"
            - name: OPTIKK_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef: { name: clickhouse-secret, key: password }
            - name: OPTIKK_SERVER_PORT
              value: "19090"
            - name: OPTIKK_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef: { name: query-secret, key: jwt-secret }
            # Seeds the platform super-admin on first boot (idempotent in query).
            - name: OPTIKK_ADMIN_EMAIL
              valueFrom:
                secretKeyRef: { name: query-secret, key: admin-email }
            - name: OPTIKK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: query-secret, key: admin-password }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 19090 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 19090 }
            initialDelaySeconds: 15
            periodSeconds: 15
