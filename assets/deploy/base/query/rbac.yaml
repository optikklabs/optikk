# Identity + permissions for query's onboarding provisioner, which
# server-side-applies per-tenant otel-collector manifests in this namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: query
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: query-provisioner
rules:
  - apiGroups: [""]
    resources: [configmaps, secrets, services]
    verbs: [get, create, patch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, create, patch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, create, patch]
  - apiGroups: [traefik.io]
    resources: [ingressroutes]
    verbs: [get, create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: query-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: query-provisioner
subjects:
  - kind: ServiceAccount
    name: query
