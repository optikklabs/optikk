# Adapted from ingest/otel-collector-config.yaml: the OTLP exporter now targets the
# in-cluster ingest Service (ingest:4318) instead of host.docker.internal.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
            include_metadata: true
          http:
            endpoint: "0.0.0.0:4318"
            include_metadata: true

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        send_batch_size: 1000
        timeout: 10s
      cumulativetodelta:
      transform/db:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - set(attributes["db.statement.normalized"], attributes["db.statement"]) where attributes["db.statement"] != nil
              - replace_pattern(attributes["db.statement.normalized"], "\\b\\d+\\b", "?") where attributes["db.statement.normalized"] != nil
              - replace_pattern(attributes["db.statement.normalized"], "'[^']*'", "?") where attributes["db.statement.normalized"] != nil
      filter/noise:
        error_mode: ignore
        traces:
          span:
            - 'IsMatch(attributes["http.route"], "^/(health|healthz|livez|readyz|metrics)$")'
      redaction:
        allow_all_keys: true
        blocked_values:
          - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b"
          - "\\b(?:\\d[ -]*?){13,16}\\b"
        summary: silent

    connectors:
      spanmetrics:
        aggregation_temporality: "AGGREGATION_TEMPORALITY_DELTA"
        histogram:
          explicit:
            buckets: [2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s, 15s]
        dimensions:
          - name: http.method
          - name: http.status_code
          - name: http.route
          - name: messaging.system
          - name: messaging.operation
          - name: messaging.destination.name
          - name: messaging.consumer.group.name
          - name: db.system
          - name: db.namespace
          - name: db.collection.name
          - name: server.address
      servicegraph:
        latency_histogram_buckets: [2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s, 15s]
        dimensions:
          - status.code
        store:
          ttl: 2s
          max_items: 1000
      exceptions:
      count:
        logs:
          log.record.count:
            description: Total log records
          log.records.errors:
            description: Error-or-higher severity log records
            conditions:
              - 'severity_number >= SEVERITY_NUMBER_ERROR'

    extensions:
      headers_setter:
        headers:
          - action: upsert
            key: x-api-key
            value: ${env:OPTIKK_API_KEY}
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777
      zpages:
        endpoint: 0.0.0.0:55679
      file_storage/queue:
        directory: /var/lib/otelcol/storage
        create_directory: true

    exporters:
      otlp/optikk:
        endpoint: "ingest:4318"
        tls:
          insecure: true
        auth:
          authenticator: headers_setter
        sending_queue:
          enabled: true
          storage: file_storage/queue
        retry_on_failure:
          enabled: true

    service:
      extensions: [headers_setter, health_check, pprof, zpages, file_storage/queue]
      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter]
          exporters: [spanmetrics, servicegraph, exceptions]
        traces/storage:
          receivers: [otlp]
          processors: [memory_limiter, transform/db, filter/noise, redaction, batch]
          exporters: [otlp/optikk]
        metrics:
          receivers: [otlp, spanmetrics, servicegraph, exceptions, count]
          processors: [memory_limiter, cumulativetodelta, batch]
          exporters: [otlp/optikk]
        logs:
          receivers: [otlp, exceptions]
          processors: [memory_limiter, batch]
          exporters: [otlp/optikk, count]
