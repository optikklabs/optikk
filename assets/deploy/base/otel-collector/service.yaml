# Internal only; external OTLP arrives through Traefik (rate-limited, TLS-terminated).
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: health
      port: 13133
      targetPort: 13133
    - name: metrics
      port: 8888
      targetPort: 8888
