apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.155.0
          args: ["--config=/etc/otelcol-contrib/config.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: health, containerPort: 13133 }
            - { name: metrics, containerPort: 8888 }
          env:
            - name: GOMEMLIMIT
              value: "400MiB"
            - name: OPTIKK_API_KEY
              valueFrom:
                secretKeyRef: { name: otel-collector-secret, key: api-key }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /, port: 13133 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 13133 }
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
            - name: queue
              mountPath: /var/lib/otelcol/storage
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: queue
          emptyDir: {}
