# The only public Service. Publishes standard ports; targets the non-privileged
# container entrypoints. Type is patched per overlay (NodePort local / LoadBalancer cloud).
apiVersion: v1
kind: Service
metadata:
  name: traefik
  labels:
    app: traefik
spec:
  type: ClusterIP
  selector:
    app: traefik
  ports:
    - name: web
      port: 80
      targetPort: 8000
    - name: websecure
      port: 443
      targetPort: 8443
    - name: otlp-grpc
      port: 4317
      targetPort: 8317
    - name: otlp-http
      port: 4318
      targetPort: 8318
