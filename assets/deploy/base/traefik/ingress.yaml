# Edge routing: query API + OTLP (gRPC/HTTP), each rate-limited.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ratelimit
spec:
  rateLimit:
    average: 100
    burst: 50
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: query
spec:
  entryPoints: [web, websecure]
  routes:
    # API surfaces go to query. More specific than `/`, so Traefik prioritises these.
    - match: PathPrefix(`/api`) || PathPrefix(`/swagger`) || PathPrefix(`/health`)
      kind: Rule
      services:
        - name: query
          port: 19090
      middlewares:
        - name: ratelimit
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web
spec:
  entryPoints: [web, websecure]
  routes:
    # Everything else is the SPA.
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: web
          port: 8080
      middlewares:
        - name: ratelimit
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: otlp-grpc
  namespace: optikk
spec:
  entryPoints: [otlp-grpc]
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: ingest
          port: 18317
          scheme: h2c
      middlewares:
        - name: ratelimit
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: otlp-http
  namespace: optikk
spec:
  entryPoints: [otlp-http]
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: ingest
          port: 18318
      middlewares:
        - name: ratelimit
