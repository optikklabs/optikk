apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: traefik
          image: traefik:v3.3
          args:
            # Non-privileged entrypoints (Service publishes 80/443/4317/4318).
            - --entrypoints.traefik.address=:9000
            - --entrypoints.web.address=:8000
            - --entrypoints.websecure.address=:8443
            - --entrypoints.otlp-grpc.address=:8317
            - --entrypoints.otlp-http.address=:8318
            - --providers.kubernetescrd=true
            - --providers.kubernetesingress=true
            - --api.dashboard=true
            - --ping=true
            - --ping.entrypoint=traefik
            - --log.level=INFO
          ports:
            - { name: traefik, containerPort: 9000 }
            - { name: web, containerPort: 8000 }
            - { name: websecure, containerPort: 8443 }
            - { name: otlp-grpc, containerPort: 8317 }
            - { name: otlp-http, containerPort: 8318 }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /ping, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ping, port: 9000 }
            initialDelaySeconds: 15
            periodSeconds: 15
