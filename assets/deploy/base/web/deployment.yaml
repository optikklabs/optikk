apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/optikklabs/web:latest
          imagePullPolicy: Always
          # Bypass the image entrypoint (it envsubst+mv's default.conf, which
          # fails over our read-only mounted config) and run nginx directly.
          command: ["nginx", "-g", "daemon off;"]
          ports:
            - { name: http, containerPort: 8080 }
          # Override the image's Cloud Run nginx config with the SPA-only one.
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 128Mi }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: nginx-conf
          configMap:
            name: web-nginx
