apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: optikk

resources:
  - namespace.yaml
  # CRDs first so IngressRoute/Middleware resolve.
  - traefik/crds.yaml
  # ClickHouse
  - clickhouse/configmap.yaml
  - clickhouse/secret.yaml
  - clickhouse/service.yaml
  - clickhouse/statefulset.yaml
  # MariaDB
  - mariadb/secret.yaml
  - mariadb/service.yaml
  - mariadb/statefulset.yaml
  # mq
  - mq/service.yaml
  - mq/statefulset.yaml
  # ingest
  - ingest/deployment.yaml
  - ingest/service.yaml
  - ingest/hpa.yaml
  # query
  - query/rbac.yaml
  - query/secret.yaml
  - query/deployment.yaml
  - query/service.yaml
  - query/hpa.yaml
  # web (UI)
  - web/configmap.yaml
  - web/deployment.yaml
  - web/service.yaml
  # otel-collector: no shared/default instance — deployed per tenant, see deploy/tenants/
  # traefik
  - traefik/rbac.yaml
  - traefik/ingressclass.yaml
  - traefik/deployment.yaml
  - traefik/service.yaml
  - traefik/ingress.yaml
  - traefik/hpa.yaml
