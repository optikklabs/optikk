apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:26.6
          ports:
            - { name: native, containerPort: 9000 }
            - { name: http, containerPort: 8123 }
            - { name: prometheus, containerPort: 9363 }
            - { name: keeper, containerPort: 9181 }
          env:
            - name: CLICKHOUSE_DB
              value: optikk
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: password
          # ClickHouse needs nofile bumped; allow via capabilities.
          securityContext:
            capabilities:
              add: ["SYS_NICE", "NET_ADMIN", "IPC_LOCK"]
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { memory: 2Gi }
          # First boot (Keeper + schema init) is slow; gate liveness/readiness
          # behind a startupProbe so the container is not killed mid-init.
          startupProbe:
            httpGet: { path: /ping, port: 8123 }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d
      volumes:
        - name: config
          configMap:
            name: clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
