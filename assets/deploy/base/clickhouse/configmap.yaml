# ClickHouse server config.d overrides. Mirrors ingest/db/clickhouse/config.d.
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
data:
  keeper.xml: |
    <yandex>
        <keeper_server>
            <tcp_port>9181</tcp_port>
            <server_id>1</server_id>
            <log_storage_path>/var/lib/clickhouse/coordination/log</log_storage_path>
            <snapshot_storage_path>/var/lib/clickhouse/coordination/snapshots</snapshot_storage_path>
            <coordination_settings>
                <operation_timeout_ms>10000</operation_timeout_ms>
                <session_timeout_ms>30000</session_timeout_ms>
                <raft_logs_level>warning</raft_logs_level>
            </coordination_settings>
            <raft_configuration>
                <server>
                    <id>1</id>
                    <hostname>localhost</hostname>
                    <port>9234</port>
                </server>
            </raft_configuration>
        </keeper_server>
        <zookeeper>
            <node>
                <host>127.0.0.1</host>
                <port>9181</port>
            </node>
        </zookeeper>
    </yandex>
  macros.xml: |
    <yandex>
        <macros>
            <shard>1</shard>
            <replica>replica_1</replica>
        </macros>
    </yandex>
  memory.xml: |
    <clickhouse>
        <!-- Cap server memory relative to the cgroup/pod limit to avoid OOM. -->
        <max_server_memory_usage_to_ram_ratio>0.7</max_server_memory_usage_to_ram_ratio>
    </clickhouse>
  network.xml: |
    <clickhouse>
        <!-- Listen on all interfaces so the Service/other pods can reach
             ClickHouse; listen_try tolerates the image's localhost binds. -->
        <listen_host>0.0.0.0</listen_host>
        <listen_try>1</listen_try>
    </clickhouse>
  prometheus.xml: |
    <clickhouse>
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>9363</port>
            <metrics>true</metrics>
            <events>true</events>
            <asynchronous_metrics>true</asynchronous_metrics>
        </prometheus>
    </clickhouse>
