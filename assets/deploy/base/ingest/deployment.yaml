apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      # Wait for datastores before the app boots (it migrates ClickHouse on start).
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mariadb 3306; do echo waiting mariadb; sleep 2; done
              until nc -z clickhouse 9000; do echo waiting clickhouse; sleep 2; done
              until nc -z mq 9092; do echo waiting mq; sleep 2; done
      containers:
        - name: ingest
          image: ghcr.io/optikklabs/ingest:latest
          imagePullPolicy: Always
          ports:
            - { name: otlp-grpc, containerPort: 18317 }
            - { name: otlp-http, containerPort: 18318 }
            - { name: metrics, containerPort: 18090 }
          env:
            - name: OPTIKK_MYSQL_HOST
              value: mariadb
            - name: OPTIKK_MYSQL_PORT
              value: "3306"
            - name: OPTIKK_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef: { name: mariadb-secret, key: root-password }
            - name: OPTIKK_CLICKHOUSE_HOST
              value: clickhouse
            - name: OPTIKK_CLICKHOUSE_PORT
              value: "9000"
            - name: OPTIKK_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef: { name: clickhouse-secret, key: password }
            - name: OPTIKK_KAFKA_BROKER_LIST
              value: "mq:9092"
            - name: OPTIKK_SERVER_PORT
              value: "18090"
            - name: OPTIKK_OTLP_GRPC_PORT
              value: "18317"
            - name: OPTIKK_OTLP_HTTP_PORT
              value: "18318"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 18090 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 18090 }
            initialDelaySeconds: 15
            periodSeconds: 15
