version: 2

project_name: optikk

before:
  hooks:
    - go mod tidy

builds:
  - id: optikk
    binary: optikk
    main: .
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/optikklabs/optikk/cmd.version={{ .Version }}

archives:
  - id: optikk
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
