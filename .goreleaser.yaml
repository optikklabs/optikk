version: 2

project_name: optikk

before:
  hooks:
    - go mod tidy

builds:
  - id: optikk
    binary: optikk
    main: .
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/optikklabs/optikk/cmd.version={{ .Version }}

archives:
  - id: optikk
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Publishes Casks/optikk.rb to optikklabs/homebrew-tap on each tag (macOS).
homebrew_casks:
  - name: optikk
    repository:
      owner: optikklabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/optikklabs/optikk"
    description: "Provision and operate the Optikk stack on local (kind) or GCP (GKE)"
    # Strip the quarantine xattr so the unsigned binary runs without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/optikk"]
          end
